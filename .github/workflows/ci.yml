name: Validacion Estricta - Backend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    # Levantamos una base de datos PostgreSQL efímera para las pruebas
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Le indicamos a GitHub que ejecute los comandos dentro de la carpeta backend
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Clonar el código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🗄️ Estructurar Base de Datos de Prueba
        env:
          PGPASSWORD: test_password
        # Instalamos el cliente, creamos la BD con el sufijo _test y luego inyectamos init.sql ahí
        run: |
          sudo apt-get install -y postgresql-client
          psql -h localhost -U test_user -d postgres -c "CREATE DATABASE test_db_test;"
          psql -h localhost -U test_user -d test_db_test -f ${{ github.workspace }}/database/init.sql

      - name: 🧪 Ejecutar Pruebas y Validar Cobertura (>80%)
        env:
          # Inyectamos variables de entorno seguras para la prueba en la nube
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: test_db
          JWT_SECRET: super_secreto_ci_cd
        run: npm run test:coverage
