version: '3.8'

services:
  # 1. Base de Datos
  db:
    image: postgres:15-alpine
    container_name: alabanza_db
    environment:
      # Usa .env local, o los valores genéricos si alguien más lo clona
      POSTGRES_USER: ${POSTGRES_USER:-admin_test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_test}
      POSTGRES_DB: ${POSTGRES_DB:-proyecto_alabanza_test}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # 2. Servidor Backend
  backend:
    build: ./backend
    container_name: alabanza_backend
    ports:
      - "3000:3000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin_test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_test}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-proyecto_alabanza_test}
      JWT_SECRET: ${JWT_SECRET:-super_secreto_academico}
    depends_on:
      - db

  # 3. Interfaz Frontend
  frontend:
    build: ./frontend
    container_name: alabanza_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend

volumes:
  postgres_data: