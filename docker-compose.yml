version: '3.8'

services:
  # 1. Base de Datos
  db:
    image: postgres:15-alpine
    container_name: alabanza_db
    env_file:
      - ./backend/.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Inyectamos los scripts de inicialización en orden alfabético
      - ./database/01-setup.sh:/docker-entrypoint-initdb.d/01-setup.sh
      - ./database/init.sql:/docker-entrypoint-initdb.d/02-init.sql
    restart: unless-stopped

  # 2. Servidor Backend
  backend:
    build: ./backend
    container_name: alabanza_backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db

  # 3. Interfaz Frontend
  frontend:
    build: ./frontend
    container_name: alabanza_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend

volumes:
  postgres_data: